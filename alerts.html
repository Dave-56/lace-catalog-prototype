<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#303246" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="LACE" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="description" content="Track price drops, restocks, and shop updates from your orbit." />
    <title>LACE Alerts</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/lace-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/lace-icon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell alerts-page">
      <header class="topbar" aria-label="Workspace">
        <a class="brand" href="/" aria-label="LACE home">
          <span class="brand-mark">L</span>
          <span>LACE</span>
        </a>

        <nav class="mode-tabs" aria-label="Workspace views">
          <a class="mode-tab" href="/">Look</a>
          <a class="mode-tab" href="/orbit.html">Orbit</a>
          <a class="mode-tab active" href="/alerts.html">Alerts</a>
        </nav>
      </header>

      <section class="alerts-hero" aria-labelledby="alerts-title">
        <p class="eyebrow">Alerts</p>
        <h1 id="alerts-title">What changed</h1>
        <p class="subhead">A compact feed of price drops, restocks, and shop updates from your orbit.</p>
      </section>

      <section class="alerts-surface" aria-label="Alert inbox">
        <div class="alerts-head">
          <div>
            <p class="eyebrow">Mock inbox</p>
            <h2>Inbox</h2>
          </div>
          <div class="alerts-count" id="alerts-count">0 active</div>
        </div>

        <div class="alert-console">
          <div class="alert-inbox" id="alert-inbox" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <script src="pwa.js"></script>
    <script src="alerts.js"></script>
  </body>
</html>
